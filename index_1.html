<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disneyland Family 🏰</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .tab-scroll::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Firebase setup ──────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyCskstI9Nt8Gw7G7mMojdiqSwY9oCvuZvs",
      authDomain: "disneyapp-11594.firebaseapp.com",
      projectId: "disneyapp-11594",
      storageBucket: "disneyapp-11594.firebasestorage.app",
      messagingSenderId: "1071701460994",
      appId: "1:1071701460994:web:bbb51a41fc36270078ff1b"
    };
    if (!window._fbInit) { firebase.initializeApp(firebaseConfig); window._fbInit = true; }
    const db = firebase.firestore();

    // ── Static data ─────────────────────────────────────────────────
    const ATTRACTIONS = [
      { id: "pirates",    land: "Adventureland",  name: "Pirates of the Caribbean",       waitTime: 35, icon: "⚓" },
      { id: "space",      land: "Tomorrowland",   name: "Space Mountain",                 waitTime: 55, icon: "🚀" },
      { id: "indy",       land: "Adventureland",  name: "Indiana Jones",                  waitTime: 45, icon: "🪨" },
      { id: "haunted",    land: "Fantasyland",    name: "Haunted Mansion",                waitTime: 20, icon: "👻" },
      { id: "thunder",    land: "Frontierland",   name: "Big Thunder Mountain",           waitTime: 40, icon: "🏔️" },
      { id: "starwars",   land: "Star Wars",      name: "Rise of the Resistance",         waitTime: 70, icon: "⚔️" },
      { id: "matterhorn", land: "Fantasyland",    name: "Matterhorn Bobsleds",            waitTime: 30, icon: "❄️" },
      { id: "jungle",     land: "Adventureland",  name: "Jungle Cruise",                  waitTime: 25, icon: "🌴" },
    ];
    const VOTE_OPTIONS = [
      { id: "v_pirates",  name: "Pirates of the Caribbean", icon: "⚓" },
      { id: "v_haunted",  name: "Haunted Mansion",          icon: "👻" },
      { id: "v_indy",     name: "Indiana Jones",            icon: "🪨" },
      { id: "v_starwars", name: "Rise of the Resistance",   icon: "⚔️" },
    ];
    const MEETUP_SPOTS = [
      "Main Street Entrance", "Sleeping Beauty Castle",
      "Matterhorn Base", "Star Wars Launch Bay", "Pirates Entrance"
    ];
    const MEMBER_OPTIONS = [
      { name: "Dad",    emoji: "👨" },
      { name: "Mom",    emoji: "👩" },
      { name: "Emma",   emoji: "👧" },
      { name: "Jake",   emoji: "👦" },
      { name: "Grandma",emoji: "👵" },
      { name: "Grandpa",emoji: "👴" },
      { name: "Guest",  emoji: "😊" },
    ];
    const STATUS_OPTIONS = ["Exploring", "In line", "On ride", "Getting food", "Resting", "At restroom"];
    const TABS = ["📍 Everyone", "🎢 Rides", "🗳️ Vote", "📸 Moments", "📣 Meet Up"];

    // ── Name picker screen ───────────────────────────────────────────
    function NamePicker({ onSelect }) {
      return (
        <div className="min-h-screen bg-gradient-to-b from-blue-900 via-blue-700 to-indigo-900 flex flex-col items-center justify-center px-6">
          <div className="text-6xl mb-3">🏰</div>
          <h1 className="text-3xl font-extrabold text-yellow-300 mb-1">Disneyland Family</h1>
          <p className="text-blue-200 text-sm mb-8">Who are you?</p>
          <div className="w-full max-w-xs bg-white rounded-3xl shadow-2xl p-6 space-y-3">
            {MEMBER_OPTIONS.map(m => (
              <button key={m.name} onClick={() => onSelect(m)}
                className="w-full flex items-center gap-3 px-4 py-3 rounded-2xl bg-blue-50 hover:bg-blue-100 transition font-semibold text-gray-800 text-left">
                <span className="text-2xl">{m.emoji}</span>{m.name}
              </button>
            ))}
          </div>
        </div>
      );
    }

    // ── Main App ────────────────────────────────────────────────────
    function App() {
      const [me, setMe]               = useState(() => {
        try { const s = localStorage.getItem("disney_me"); return s ? JSON.parse(s) : null; } catch { return null; }
      });
      const [tab, setTab]             = useState(0);
      const [members, setMembers]     = useState([]);
      const [votes, setVotes]         = useState({});
      const [moments, setMoments]     = useState([]);
      const [meetup, setMeetup]       = useState(null);
      const [plannedRides, setPlanned]= useState([]);
      const [myStatus, setMyStatus]   = useState("Exploring");
      const [myLocation, setMyLocation]= useState("Main Street");
      const [caption, setCaption]     = useState("");
      const [meetupSpot, setMeetupSpot]= useState(null);
      const [meetupTime, setMeetupTime]= useState("14:00");
      const [alertSent, setAlertSent] = useState(false);
      const [statusEditing, setStatusEditing] = useState(false);

      // Save me to localStorage
      useEffect(() => {
        if (me) {
          try { localStorage.setItem("disney_me", JSON.stringify(me)); } catch {}
          // Register/update self in Firestore
          db.collection("members").doc(me.name).set({
            name: me.name, emoji: me.emoji,
            status: myStatus, location: myLocation,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
        }
      }, [me]);

      // Real-time listeners
      useEffect(() => {
        const unsubs = [];
        unsubs.push(db.collection("members").onSnapshot(snap => {
          setMembers(snap.docs.map(d => d.data()));
        }));
        unsubs.push(db.collection("votes").onSnapshot(snap => {
          const v = {}; snap.docs.forEach(d => v[d.id] = d.data()); setVotes(v);
        }));
        unsubs.push(db.collection("moments").orderBy("createdAt","desc").limit(30).onSnapshot(snap => {
          setMoments(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        }));
        unsubs.push(db.collection("meetup").doc("current").onSnapshot(snap => {
          if (snap.exists) setMeetup(snap.data());
        }));
        return () => unsubs.forEach(u => u());
      }, []);

      const updateStatus = () => {
        if (!me) return;
        db.collection("members").doc(me.name).set({
          name: me.name, emoji: me.emoji,
          status: myStatus, location: myLocation,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        setStatusEditing(false);
      };

      const castVote = (optionId) => {
        if (!me) return;
        // remove my vote from all options first
        VOTE_OPTIONS.forEach(o => {
          db.collection("votes").doc(o.id).set({
            name: o.name, icon: o.icon,
            voters: firebase.firestore.FieldValue.arrayRemove(me.name)
          }, { merge: true });
        });
        // add vote to chosen option
        db.collection("votes").doc(optionId).set({
          voters: firebase.firestore.FieldValue.arrayUnion(me.name)
        }, { merge: true });
      };

      const postMoment = () => {
        if (!caption.trim() || !me) return;
        db.collection("moments").add({
          who: me.name, emoji: me.emoji, caption,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        setCaption("");
      };

      const sendMeetup = () => {
        if (!meetupSpot || !me) return;
        db.collection("meetup").doc("current").set({
          spot: meetupSpot, time: meetupTime,
          sentBy: me.name, sentEmoji: me.emoji,
          sentAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        setAlertSent(true);
        setTimeout(() => setAlertSent(false), 3000);
      };

      const myVote = me ? VOTE_OPTIONS.find(o => votes[o.id]?.voters?.includes(me.name))?.id : null;
      const totalVotes = VOTE_OPTIONS.reduce((s, o) => s + (votes[o.id]?.voters?.length || 0), 0);

      if (!me) return <NamePicker onSelect={setMe} />;

      return (
        <div className="min-h-screen bg-gradient-to-b from-blue-900 via-blue-700 to-indigo-900 flex flex-col items-center py-5 px-3">
          {/* Header */}
          <div className="text-center mb-4">
            <div className="text-4xl mb-0.5">🏰</div>
            <h1 className="text-2xl font-extrabold text-yellow-300 tracking-wide">Disneyland Family</h1>
            <p className="text-blue-200 text-xs">Hi {me.emoji} {me.name}! &nbsp;•&nbsp; {members.length} member{members.length !== 1 ? "s" : ""} connected</p>
          </div>

          <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden">
            {/* Tabs */}
            <div className="flex overflow-x-auto tab-scroll border-b border-gray-100 bg-gray-50">
              {TABS.map((t, i) => (
                <button key={i} onClick={() => setTab(i)}
                  className={`flex-shrink-0 px-3 py-3 text-xs font-semibold transition-all ${
                    tab === i ? "border-b-2 border-blue-600 text-blue-700 bg-white" : "text-gray-500 hover:text-gray-700"
                  }`}>{t}</button>
              ))}
            </div>

            <div className="p-5">

              {/* ── TAB 0: Where Is Everyone ── */}
              {tab === 0 && (
                <div>
                  <h2 className="font-bold text-gray-800 text-lg mb-3">Family Locations</h2>
                  {/* My status editor */}
                  <div className="bg-blue-600 rounded-2xl p-3 mb-4 text-white">
                    <div className="flex items-center justify-between mb-2">
                      <span className="font-semibold text-sm">Your status {me.emoji}</span>
                      <button onClick={() => statusEditing ? updateStatus() : setStatusEditing(true)}
                        className="text-xs bg-white text-blue-600 font-bold px-3 py-1 rounded-full">
                        {statusEditing ? "Save" : "Update"}
                      </button>
                    </div>
                    {statusEditing ? (
                      <div className="space-y-2">
                        <input value={myLocation} onChange={e => setMyLocation(e.target.value)}
                          placeholder="Location (e.g. Fantasyland)"
                          className="w-full text-gray-800 text-sm px-3 py-1.5 rounded-xl focus:outline-none" />
                        <div className="flex flex-wrap gap-1">
                          {STATUS_OPTIONS.map(s => (
                            <button key={s} onClick={() => setMyStatus(s)}
                              className={`text-xs px-2 py-1 rounded-full font-medium ${myStatus === s ? "bg-white text-blue-700" : "bg-blue-500 text-white"}`}>
                              {s}
                            </button>
                          ))}
                        </div>
                      </div>
                    ) : (
                      <p className="text-sm text-blue-100">📍 {myLocation} &nbsp;•&nbsp; {myStatus}</p>
                    )}
                  </div>
                  {/* Members list */}
                  <div className="space-y-2">
                    {members.length === 0 && <p className="text-gray-400 text-sm text-center py-4">No one else connected yet...</p>}
                    {members.map(m => (
                      <div key={m.name} className={`flex items-center gap-3 rounded-2xl p-3 ${m.name === me.name ? "bg-blue-50 border-2 border-blue-200" : "bg-gray-50"}`}>
                        <div className="text-2xl">{m.emoji}</div>
                        <div className="flex-1">
                          <div className="font-semibold text-gray-800 text-sm">{m.name} {m.name === me.name && <span className="text-xs text-blue-500">(you)</span>}</div>
                          <div className="text-xs text-blue-600">📍 {m.location || "—"}</div>
                        </div>
                        <span className={`text-xs px-2 py-1 rounded-full font-medium whitespace-nowrap ${
                          m.status === "On ride" ? "bg-green-100 text-green-700" :
                          m.status === "In line" ? "bg-orange-100 text-orange-700" :
                          m.status === "Getting food" ? "bg-yellow-100 text-yellow-700" :
                          "bg-gray-100 text-gray-600"}`}>{m.status || "Exploring"}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* ── TAB 1: Rides ── */}
              {tab === 1 && (
                <div>
                  <h2 className="font-bold text-gray-800 text-lg mb-1">Ride Planner</h2>
                  <p className="text-xs text-gray-500 mb-3">Tap to add to your personal plan</p>
                  <div className="space-y-2">
                    {ATTRACTIONS.map(r => (
                      <div key={r.id} onClick={() => setPlanned(p => p.includes(r.id) ? p.filter(x => x !== r.id) : [...p, r.id])}
                        className={`flex items-center gap-3 rounded-2xl p-3 cursor-pointer border-2 transition-all ${
                          plannedRides.includes(r.id) ? "border-blue-400 bg-blue-50" : "border-transparent bg-gray-50 hover:bg-gray-100"}`}>
                        <div className="text-2xl">{r.icon}</div>
                        <div className="flex-1">
                          <div className="font-semibold text-gray-800 text-sm">{r.name}</div>
                          <div className="text-xs text-gray-500">{r.land}</div>
                        </div>
                        <div className="text-right mr-1">
                          <div className={`text-sm font-bold ${r.waitTime > 50 ? "text-red-500" : r.waitTime > 30 ? "text-orange-500" : "text-green-600"}`}>{r.waitTime}m</div>
                          <div className="text-xs text-gray-400">wait</div>
                        </div>
                        {plannedRides.includes(r.id) && <div className="text-blue-500 font-bold">✓</div>}
                      </div>
                    ))}
                  </div>
                  {plannedRides.length > 0 && (
                    <div className="mt-3 bg-blue-600 rounded-2xl p-3 text-white text-center text-sm font-semibold">
                      🎢 {plannedRides.length} ride{plannedRides.length > 1 ? "s" : ""} in your plan!
                    </div>
                  )}
                </div>
              )}

              {/* ── TAB 2: Vote ── */}
              {tab === 2 && (
                <div>
                  <h2 className="font-bold text-gray-800 text-lg mb-1">What's Next? 🗳️</h2>
                  <p className="text-xs text-gray-500 mb-4">Everyone votes — live results</p>
                  <div className="space-y-3">
                    {VOTE_OPTIONS.map(opt => {
                      const voters = votes[opt.id]?.voters || [];
                      const pct = totalVotes ? Math.round((voters.length / totalVotes) * 100) : 0;
                      const iMine = myVote === opt.id;
                      return (
                        <button key={opt.id} onClick={() => castVote(opt.id)}
                          className={`w-full text-left rounded-2xl p-3 border-2 transition-all ${iMine ? "border-blue-500 bg-blue-50" : "border-gray-200 bg-gray-50 hover:border-blue-300"}`}>
                          <div className="flex justify-between items-center mb-1.5">
                            <span className="font-semibold text-sm text-gray-800">{opt.icon} {opt.name}</span>
                            <span className="text-sm font-bold text-blue-600">{voters.length} vote{voters.length !== 1 ? "s" : ""}</span>
                          </div>
                          <div className="w-full bg-gray-200 rounded-full h-2 mb-1">
                            <div className="bg-blue-500 h-2 rounded-full transition-all duration-700" style={{ width: `${pct}%` }} />
                          </div>
                          {voters.length > 0 && (
                            <div className="text-xs text-gray-500">{voters.join(", ")}</div>
                          )}
                        </button>
                      );
                    })}
                  </div>
                  {myVote && (
                    <div className="mt-4 text-center text-sm text-green-600 font-semibold bg-green-50 rounded-2xl p-3">
                      ✅ You voted! Live results update as family votes.
                    </div>
                  )}
                </div>
              )}

              {/* ── TAB 3: Moments ── */}
              {tab === 3 && (
                <div>
                  <h2 className="font-bold text-gray-800 text-lg mb-3">Family Moments 📸</h2>
                  <div className="flex gap-2 mb-4">
                    <input value={caption} onChange={e => setCaption(e.target.value)}
                      onKeyDown={e => e.key === "Enter" && postMoment()}
                      placeholder="Share a moment with the family..."
                      className="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400" />
                    <button onClick={postMoment}
                      className="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-blue-700 transition">Post</button>
                  </div>
                  <div className="space-y-3">
                    {moments.length === 0 && <p className="text-gray-400 text-sm text-center py-6">No moments yet — be the first! 🎉</p>}
                    {moments.map((m, i) => {
                      const colors = ["bg-purple-100","bg-yellow-100","bg-pink-100","bg-green-100","bg-blue-100","bg-orange-100"];
                      const c = colors[i % colors.length];
                      const time = m.createdAt?.toDate?.()?.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) || "just now";
                      return (
                        <div key={m.id} className={`${c} rounded-2xl p-4`}>
                          <div className="flex items-center gap-2 mb-1">
                            <span className="text-xl">{m.emoji}</span>
                            <span className="font-semibold text-gray-800 text-sm">{m.who}</span>
                            <span className="text-xs text-gray-400 ml-auto">{time}</span>
                          </div>
                          <p className="text-gray-700 text-sm">{m.caption}</p>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* ── TAB 4: Meet Up ── */}
              {tab === 4 && (
                <div>
                  <h2 className="font-bold text-gray-800 text-lg mb-1">Meet Up 📣</h2>
                  <p className="text-xs text-gray-500 mb-4">Alert the whole family to meet somewhere</p>

                  {/* Active meetup banner */}
                  {meetup && (
                    <div className="bg-yellow-50 border-2 border-yellow-300 rounded-2xl p-3 mb-4">
                      <div className="text-sm font-bold text-yellow-800 mb-0.5">📣 Active Meet-Up</div>
                      <div className="text-sm text-yellow-700">
                        {meetup.sentEmoji} <strong>{meetup.sentBy}</strong> says: meet at <strong>{meetup.spot}</strong> at <strong>{meetup.time}</strong>
                      </div>
                    </div>
                  )}

                  <div className="mb-4">
                    <label className="text-sm font-semibold text-gray-700 block mb-2">📍 Choose a spot</label>
                    <div className="space-y-2">
                      {MEETUP_SPOTS.map(s => (
                        <button key={s} onClick={() => setMeetupSpot(s)}
                          className={`w-full text-left px-4 py-2.5 rounded-2xl border-2 text-sm transition-all ${
                            meetupSpot === s ? "border-blue-500 bg-blue-50 font-semibold text-blue-700" : "border-gray-200 bg-gray-50 text-gray-700 hover:border-blue-300"}`}>
                          {s}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className="mb-4">
                    <label className="text-sm font-semibold text-gray-700 block mb-2">⏰ What time?</label>
                    <input type="time" value={meetupTime} onChange={e => setMeetupTime(e.target.value)}
                      className="border border-gray-200 rounded-xl px-3 py-2 text-sm w-full focus:outline-none focus:border-blue-400" />
                  </div>

                  <button onClick={sendMeetup} disabled={!meetupSpot}
                    className={`w-full py-3 rounded-2xl font-bold text-white text-sm transition-all ${meetupSpot ? "bg-blue-600 hover:bg-blue-700" : "bg-gray-300 cursor-not-allowed"}`}>
                    📣 Alert the Family!
                  </button>

                  {alertSent && (
                    <div className="mt-3 bg-green-100 border border-green-300 rounded-2xl p-3 text-center">
                      <div className="font-bold text-green-700">🎉 Alert sent to everyone!</div>
                      <div className="text-sm text-green-600">Meet at <strong>{meetupSpot}</strong> at <strong>{meetupTime}</strong></div>
                    </div>
                  )}
                </div>
              )}

            </div>
          </div>

          <button onClick={() => { localStorage.removeItem("disney_me"); setMe(null); }}
            className="mt-4 text-blue-300 text-xs underline">Switch user</button>
          <p className="text-blue-300 text-xs mt-1">✨ Have a magical day!</p>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
